name: Release and Docker Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 1.0.0 or v1.0.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.version.outputs.version_tag }}
      release_notes_file: ${{ steps.notes.outputs.file }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          if [[ "$VERSION" != v* ]]; then
            VERSION="v$VERSION"
          fi
          echo "version_tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate conventional commits
        run: |
          LAST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          RANGE="HEAD"
          if [[ -n "$LAST_TAG" ]]; then
            RANGE="$LAST_TAG..HEAD"
          fi
          INVALID="$(git log --pretty=format:%s $RANGE | grep -Ev '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore)(\(.+\))?!?: .+' || true)"
          if [[ -n "$INVALID" ]]; then
            echo "Found non-conventional commit messages:"
            echo "$INVALID"
            exit 1
          fi

      - name: Generate release notes
        id: notes
        run: |
          LAST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          RANGE="HEAD"
          if [[ -n "$LAST_TAG" ]]; then
            RANGE="$LAST_TAG..HEAD"
          fi
          NOTES_FILE="release-notes.md"
          {
            echo "## Changes"
            echo
            git log --pretty=format:'- %s (%h)' $RANGE
          } > "$NOTES_FILE"
          echo "file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version_tag }}
          name: ${{ steps.version.outputs.version_tag }}
          body_path: ${{ steps.notes.outputs.file }}

  docker:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/foodmaster:${{ needs.release.outputs.version_tag }}
            ghcr.io/${{ github.repository_owner }}/foodmaster:latest
