name: Release and Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 1.0.0 or v1.0.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.version.outputs.version_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          if [[ "$VERSION" != v* ]]; then
            VERSION="v$VERSION"
          fi
          echo "version_tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version_tag }}
          name: ${{ steps.version.outputs.version_tag }}
          generate_release_notes: true

  docker:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/foodmaster:${{ needs.release.outputs.version_tag }}
            ghcr.io/${{ github.repository_owner }}/foodmaster:latest
